backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"
locale: "fr"

collections:
  - name: "site"
    label: "Contenu du site"
    files:
      - file: "content/content.json"
        label: "Page d'accueil"
        name: "home"
        format: "json"
        fields:
          - label: "Section Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tagline", name: "tag", widget: "string" }
              - { label: "Titre Ligne 1", name: "title_line1", widget: "string" }
              - { label: "Titre Mot accent", name: "title_accent", widget: "string" }
              - { label: "Sous-titre", name: "subtitle", widget: "text" }
          - label: "Statistiques"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Nombre", name: "number", widget: "string" }
              - { label: "Suffixe", name: "suffix", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Telephone", name: "phone", widget: "string" }
